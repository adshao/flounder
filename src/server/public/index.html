<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>full-stack-auditor</title>
<style>
  /* GitHub Primer (dark) design tokens */
  :root {
    --canvas: #0d1117; --canvas-subtle: #161b22; --canvas-inset: #010409;
    --border: #30363d; --border-muted: #21262d;
    --fg: #e6edf3; --fg-muted: #7d8590; --fg-subtle: #6e7681;
    --accent: #2f81f7; --accent-emphasis: #1f6feb;
    --success-fg: #3fb950; --success-emphasis: #238636; --success-hover: #2ea043;
    --attention-fg: #d29922; --danger-fg: #f85149; --danger-emphasis: #da3633; --done-fg: #a371f7;
    --neutral-emphasis: #6e7681;
    --btn-bg: #21262d; --btn-border: rgba(240,246,252,0.1); --btn-hover: #30363d;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--canvas); color: var(--fg); font: 14px/1.5 var(--sans); }
  a { color: var(--accent); text-decoration: none; } a:hover { text-decoration: underline; }

  /* Top nav (Primer header) */
  header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--canvas-inset); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5; }
  header .mark { color: var(--fg); display: flex; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .sub { color: var(--fg-muted); font-size: 13px; }
  header .spacer { flex: 1; }

  /* Buttons (Primer) */
  .btn { font: 500 14px/20px var(--sans); cursor: pointer; background: var(--btn-bg); color: var(--fg); border: 1px solid var(--btn-border); border-radius: 6px; padding: 5px 16px; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: var(--btn-hover); border-color: var(--fg-subtle); }
  .btn.primary { background: var(--success-emphasis); color: #fff; border-color: var(--btn-border); }
  .btn.primary:hover { background: var(--success-hover); }
  .btn.danger { color: var(--danger-fg); }
  .btn.danger:hover { background: var(--danger-emphasis); color: #fff; border-color: var(--danger-emphasis); }
  .btn.sm { padding: 3px 12px; font-size: 12px; }
  .btn:disabled { opacity: .5; cursor: default; }
  .octicon { fill: currentColor; flex: none; }

  /* Counter (Primer) */
  .counter { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; padding: 2px 10px; border-radius: 2em; border: 1px solid var(--border); color: var(--fg-muted); background: var(--canvas-subtle); }
  .counter.live { color: var(--success-fg); border-color: rgba(63,185,80,.4); }

  main { display: grid; grid-template-columns: 396px 1fr; height: calc(100vh - 53px); }
  #list { overflow-y: auto; border-right: 1px solid var(--border); padding: 16px; background: var(--canvas); }
  #detail { overflow-y: auto; padding: 24px 28px; }

  /* Box (Primer) */
  .box { border: 1px solid var(--border); border-radius: 6px; background: var(--canvas); overflow: hidden; }
  .box-header { background: var(--canvas-subtle); padding: 10px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .box-row { padding: 14px 16px; border-bottom: 1px solid var(--border-muted); cursor: pointer; }
  .box-row:last-child { border-bottom: 0; }
  .box-row:hover { background: var(--canvas-subtle); }
  .box-row.sel { background: #122033; box-shadow: inset 3px 0 0 var(--accent); }
  .box-row .top { display: flex; align-items: center; gap: 8px; }
  .box-row .name { font-weight: 600; font-size: 15px; color: var(--fg); }
  .box-row .name:hover { color: var(--accent); }
  .muted { color: var(--fg-muted); font-size: 12px; }

  /* State badge (Primer issue/PR state) */
  .state { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; line-height: 18px; padding: 4px 11px; border-radius: 2em; color: #fff; }
  .state.running { background: var(--accent-emphasis); } .state.done { background: var(--success-emphasis); }
  .state.error { background: var(--danger-emphasis); } .state.killed { background: var(--neutral-emphasis); }
  .state.none { background: var(--neutral-emphasis); }

  /* Labels (Primer issue labels) — finding status */
  .labels { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .label { display: inline-block; white-space: nowrap; font-size: 12px; font-weight: 500; line-height: 18px; padding: 0 8px; border-radius: 2em; border: 1px solid; background: transparent; }
  td:first-child { white-space: nowrap; }
  .s-confirmed-differential { color: var(--success-fg); border-color: rgba(63,185,80,.4); background: rgba(63,185,80,.1); }
  .s-confirmed-executable { color: #56d4dd; border-color: rgba(57,197,207,.4); background: rgba(57,197,207,.1); }
  .s-confirmed-source { color: var(--accent); border-color: rgba(47,129,247,.4); background: rgba(47,129,247,.1); }
  .s-suspected { color: var(--attention-fg); border-color: rgba(210,153,34,.4); background: rgba(210,153,34,.1); }
  .s-refuted { color: var(--danger-fg); border-color: rgba(248,81,73,.4); background: rgba(248,81,73,.1); }

  /* Progress (Primer) */
  .progress { height: 8px; border-radius: 6px; background: var(--border-muted); overflow: hidden; display: flex; margin-top: 12px; }
  .progress > span { display: block; height: 100%; }
  .progress > .audited { background: var(--success-emphasis); }
  .progress > .pending { background: var(--neutral-emphasis); opacity: .45; }

  /* Detail */
  .d-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .d-head h2 { font-size: 20px; font-weight: 600; margin: 0; }
  .stats { display: flex; gap: 22px; margin: 16px 0; flex-wrap: wrap; }
  .stat .n { font-size: 22px; font-weight: 600; } .stat .k { color: var(--fg-muted); font-size: 12px; }
  .section-title { font-size: 14px; font-weight: 600; margin: 26px 0 10px; display: flex; align-items: center; gap: 8px; }
  .actions { display: flex; gap: 8px; margin: 16px 0 4px; flex-wrap: wrap; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  thead th { background: var(--canvas-subtle); color: var(--fg-muted); font-weight: 500; font-size: 12px; text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  tbody td { padding: 9px 12px; border-bottom: 1px solid var(--border-muted); vertical-align: top; }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr:hover { background: var(--canvas-subtle); }
  .mono { font-family: var(--mono); font-size: 12px; }
  .timeline { color: var(--fg-muted); font-size: 11px; font-family: var(--mono); }
  .empty { color: var(--fg-muted); padding: 56px 16px; text-align: center; }
  .dotled { display: inline-flex; align-items: center; gap: 7px; }

  /* Dialog (Primer) */
  dialog { background: var(--canvas-subtle); color: var(--fg); border: 1px solid var(--border); border-radius: 12px; padding: 0; width: min(560px, 92vw); box-shadow: 0 16px 32px rgba(1,4,9,.85); }
  dialog::backdrop { background: rgba(1,4,9,.5); }
  .dlg-head { padding: 16px 16px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 600; }
  form .body { padding: 8px 16px 16px; max-height: 66vh; overflow-y: auto; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--fg); margin: 12px 0 5px; }
  input, select { width: 100%; background: var(--canvas-inset); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font: inherit; }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(47,129,247,.3); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 14px; }
  .checks { display: flex; gap: 20px; margin-top: 14px; }
  .checks label { display: flex; align-items: center; gap: 7px; margin: 0; }
  .checks input { width: auto; }
  .hint { color: var(--fg-muted); font-size: 12px; margin-top: 10px; }
  .dlg-foot { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 16px; border-top: 1px solid var(--border); background: var(--canvas); }
</style>
</head>
<body>
<header>
  <span class="mark"><svg class="octicon" width="26" height="26" viewBox="0 0 16 16" aria-hidden="true"><path d="M8.533.133a1.75 1.75 0 0 0-1.066 0l-5.25 1.68A1.75 1.75 0 0 0 1 3.48V7c0 1.566.32 3.18 1.303 4.68.983 1.5 2.585 2.813 5.032 3.855a1.7 1.7 0 0 0 1.33 0c2.447-1.042 4.049-2.356 5.032-3.855C14.68 10.18 15 8.566 15 7V3.48a1.75 1.75 0 0 0-1.217-1.667L8.533.133ZM7.4 11.5 4.45 8.55l1.06-1.06L7.4 9.38l3.09-3.09 1.06 1.06L7.4 11.5Z"></path></svg></span>
  <h1>full-stack-auditor</h1>
  <span class="sub">audit tracker</span>
  <span class="spacer"></span>
  <span id="livePill" class="counter">connecting…</span>
  <button class="btn primary" id="newRunBtn"><svg class="octicon" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path d="M7.75 2a.75.75 0 0 1 .75.75V7h4.25a.75.75 0 0 1 0 1.5H8.5v4.25a.75.75 0 0 1-1.5 0V8.5H2.75a.75.75 0 0 1 0-1.5H7V2.75A.75.75 0 0 1 7.75 2Z"></path></svg>New run</button>
</header>
<main>
  <div id="list"></div>
  <div id="detail"><div class="empty">Select a project, or start a new run.</div></div>
</main>

<dialog id="runDialog">
  <form method="dialog" id="runForm">
    <div class="dlg-head">Start a new run</div>
    <div class="body">
      <div class="grid2">
        <div><label>Verb</label>
          <select name="verb">
            <option value="run">run — map → audit</option>
            <option value="map">map — enumerate scopes</option>
            <option value="audit">audit — dig inventory/region</option>
            <option value="confirm">confirm — reproduce on real target</option>
          </select></div>
        <div><label>Target (project name)</label><input name="target" required placeholder="my-protocol" /></div>
      </div>
      <label>Source paths (space-separated)</label><input name="sourcePaths" placeholder="./contracts ./src" required />
      <div class="grid2">
        <div><label>Build root</label><input name="buildRoot" placeholder="." /></div>
        <div><label>Corpus paths</label><input name="corpusPaths" placeholder="./docs/specs" /></div>
      </div>
      <div class="grid2">
        <div><label>Provider</label><input name="provider" placeholder="openai-codex" /></div>
        <div><label>Model</label><input name="model" placeholder="(default)" /></div>
      </div>
      <div class="grid2">
        <div><label>Thinking</label>
          <select name="thinking"><option value="">(default)</option><option>minimal</option><option>low</option><option>medium</option><option>high</option><option value="xhigh">xhigh</option></select></div>
        <div><label>Max scopes</label><input name="maxScopes" type="number" min="1" placeholder="10" /></div>
      </div>
      <div class="grid2">
        <div><label>Map steps</label><input name="mapSteps" type="number" min="1" placeholder="(unbounded)" /></div>
        <div><label>Dig steps</label><input name="digSteps" type="number" min="1" placeholder="(unbounded)" /></div>
      </div>
      <div class="grid2">
        <div><label>Dig samples</label><input name="digSamples" type="number" min="1" placeholder="1" /></div>
        <div><label>Dig concurrency</label><input name="digConcurrency" type="number" min="1" placeholder="1" /></div>
      </div>
      <div class="grid2" id="confirmOnly" style="display:none">
        <div><label>Input run dir (confirm)</label><input name="inputRunDir" placeholder="runs/my-protocol-…" /></div>
        <div></div>
      </div>
      <div class="checks">
        <label><input type="checkbox" name="quick" /> quick (breadth)</label>
        <label><input type="checkbox" name="mockLlm" /> mock (offline)</label>
      </div>
      <div class="hint">Budgets are unbounded by default. Continue resumes; Restart re-maps. Source &amp; config are remembered per project.</div>
    </div>
    <div class="dlg-foot">
      <button type="button" class="btn" id="cancelBtn">Cancel</button>
      <button class="btn primary" id="launchBtn" value="launch">Launch run</button>
    </div>
  </form>
</dialog>

<script>
const $ = (sel) => document.querySelector(sel);
let state = { projects: [], active: [], selected: null, detail: null };

const OCT = {
  sync: '<path d="M1.705 8.005a.75.75 0 0 1 .834.656 5.5 5.5 0 0 0 9.592 2.97l-1.204-1.204a.25.25 0 0 1 .177-.427h3.646a.25.25 0 0 1 .25.25v3.646a.25.25 0 0 1-.427.177l-1.38-1.38A7.002 7.002 0 0 1 1.05 8.84a.75.75 0 0 1 .656-.834ZM8 2.5a5.487 5.487 0 0 0-4.131 1.869l1.204 1.204A.25.25 0 0 1 4.896 6H1.25A.25.25 0 0 1 1 5.75V2.104a.25.25 0 0 1 .427-.177l1.38 1.38A7.002 7.002 0 0 1 14.95 7.16a.75.75 0 0 1-1.49.178A5.5 5.5 0 0 0 8 2.5Z"></path>',
  x: '<path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"></path>',
  play: '<path d="M4.25 3a.75.75 0 0 0-.75.75v8.5a.75.75 0 0 0 1.136.643l7-4.25a.75.75 0 0 0 0-1.286l-7-4.25A.75.75 0 0 0 4.25 3Z"></path>',
  bug: '<path d="M4.72.22a.75.75 0 0 1 1.06 0l1 .999a3.5 3.5 0 0 1 2.441 0l.999-1a.748.748 0 0 1 1.06 0 .75.75 0 0 1 0 1.06l-.775.776c.616.63.995 1.493.995 2.445v.327c0 .1-.009.197-.025.292.408.14.764.392 1.029.722l1.968-.787a.75.75 0 0 1 .556 1.392L13 8.417V9h2.25a.75.75 0 0 1 0 1.5H13v.583l2.03.812a.75.75 0 0 1-.557 1.392l-1.968-.787a3.001 3.001 0 0 1-5.01 0l-1.968.787a.75.75 0 0 1-.556-1.392L3 11.083V10.5H.75a.75.75 0 0 1 0-1.5H3v-.583L.97 7.605a.75.75 0 0 1 .556-1.392l1.968.787c.265-.33.621-.582 1.029-.722a1.673 1.673 0 0 1-.025-.292V5.46c0-.952.38-1.816.995-2.445L4.72 1.28a.75.75 0 0 1 0-1.06Z"></path>',
};
const icon = (name, size) => '<svg class="octicon" width="' + (size||16) + '" height="' + (size||16) + '" viewBox="0 0 16 16" aria-hidden="true">' + OCT[name] + '</svg>';

function statusBadge(status) { return '<span class="label s-' + status + '">' + status + '</span>'; }
function labelWithCount(status, n) { return '<span class="label s-' + status + '">' + n + ' ' + status + '</span>'; }
function stateBadge(s) { const cls = ["running","done","error","killed"].includes(s) ? s : "none"; const txt = s || "no runs"; return '<span class="state ' + cls + '">' + txt + '</span>'; }
function esc(s) { return String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
function pct(a, t) { return t > 0 ? Math.round((a / t) * 100) : 0; }

function renderList() {
  const el = $("#list");
  if (state.projects.length === 0) { el.innerHTML = '<div class="box"><div class="empty">No projects yet.<br>Start one with “New run”.</div></div>'; return; }
  const rows = state.projects.map((p) => {
    const pr = p.progress || { total: 0, audited: 0, pending: 0 };
    const labels = Object.entries(p.findingCounts || {}).map(([s, n]) => labelWithCount(s, n)).join(" ");
    const running = p.activeRuns > 0;
    const st = running ? "running" : (p.latestRun ? p.latestRun.status : "");
    return '<div class="box-row ' + (state.selected === p.name ? "sel" : "") + '" data-name="' + esc(p.name) + '">'
      + '<div class="top"><span class="name">' + esc(p.name) + '</span><span class="spacer" style="flex:1"></span>' + stateBadge(st) + '</div>'
      + '<div class="muted" style="margin-top:6px">scopes ' + pr.audited + '/' + pr.total + ' audited · ' + pr.pending + ' pending · ' + p.runCount + ' run' + (p.runCount === 1 ? "" : "s") + '</div>'
      + '<div class="progress"><span class="audited" style="width:' + pct(pr.audited, pr.total) + '%"></span><span class="pending" style="width:' + pct(pr.pending, pr.total) + '%"></span></div>'
      + (labels ? '<div class="labels">' + labels + '</div>' : '<div class="muted" style="margin-top:10px">' + p.findingsTotal + ' findings</div>')
      + '</div>';
  }).join("");
  el.innerHTML = '<div class="box"><div class="box-header">' + icon("bug") + 'Projects <span class="counter" style="margin-left:auto">' + state.projects.length + '</span></div>' + rows + '</div>';
  el.querySelectorAll(".box-row").forEach((c) => c.onclick = () => selectProject(c.dataset.name));
}

async function selectProject(name) { state.selected = name; renderList(); await refreshDetail(); }

async function refreshDetail() {
  if (!state.selected) return;
  const res = await fetch("/api/projects/" + encodeURIComponent(state.selected));
  state.detail = res.ok ? await res.json() : null;
  renderDetail();
}

function renderDetail() {
  const el = $("#detail");
  const d = state.detail;
  if (!d) { el.innerHTML = '<div class="empty">Select a project, or start a new run.</div>'; return; }
  const cfg = (() => { try { return JSON.parse(d.project.config_json); } catch { return {}; } })();
  const pr = d.progress;
  const running = state.active.filter((a) => a.target === d.project.name);
  const st = running.length ? "running" : (d.runs[0] ? d.runs[0].status : "");
  const runsRows = d.runs.map((r) => '<tr><td><span class="dotled">' + stateBadge(r.status) + ' ' + r.kind + '</span></td><td class="mono">' + (r.scopes_audited ?? "-") + "/" + (r.scopes_total ?? "-")
    + '</td><td class="mono">' + (r.findings_total ?? "-") + '</td><td class="mono muted">' + esc((r.run_dir || "").split("/").pop()) + '</td><td class="mono muted">' + esc(r.started_at) + '</td></tr>').join("");
  const findRows = d.findings.map((f) => '<tr><td>' + statusBadge(f.status) + '</td><td>' + esc(f.title)
    + '</td><td class="mono muted">' + esc(f.location) + '</td><td class="timeline">' + (f.timeline || []).map((e) => e.to_status).join(" → ") + '</td></tr>').join("");
  el.innerHTML =
    '<div class="d-head"><h2>' + esc(d.project.name) + '</h2>' + stateBadge(st) + '</div>'
    + '<div class="muted mono" style="margin-top:6px">' + esc(cfg.provider || "") + (cfg.model ? " · " + esc(cfg.model) : "") + (cfg.thinking ? " · " + esc(cfg.thinking) : "")
      + " · max-scopes " + (cfg.maxScopes ?? "-") + " · map/dig steps " + (cfg.mapSteps ?? "∞") + "/" + (cfg.digSteps ?? "∞") + '</div>'
    + '<div class="progress" style="margin-top:16px;height:10px"><span class="audited" style="width:' + pct(pr.audited, pr.total) + '%"></span><span class="pending" style="width:' + pct(pr.pending, pr.total) + '%"></span></div>'
    + '<div class="stats">'
      + '<div class="stat"><div class="n">' + pr.total + '</div><div class="k">scopes mapped</div></div>'
      + '<div class="stat"><div class="n" style="color:var(--success-fg)">' + pr.audited + '</div><div class="k">audited</div></div>'
      + '<div class="stat"><div class="n">' + pr.pending + '</div><div class="k">pending</div></div>'
      + '<div class="stat"><div class="n">' + d.findings.length + '</div><div class="k">findings</div></div>'
      + '<div class="stat"><div class="n">' + d.runs.length + '</div><div class="k">runs</div></div>'
    + '</div>'
    + '<div class="actions">'
      + '<button class="btn primary" id="continueBtn">' + icon("play") + 'Continue audit</button>'
      + '<button class="btn" id="restartBtn">' + icon("sync") + 'Restart (re-map)</button>'
      + running.map((a) => '<button class="btn danger" data-kill="' + a.pid + '">' + icon("x") + 'Stop ' + a.verb + ' · pid ' + a.pid + '</button>').join("")
    + '</div>'
    + '<div class="section-title">' + icon("play") + 'Runs</div>'
    + (d.runs.length ? '<table><thead><tr><th>kind</th><th>scopes</th><th>findings</th><th>dir</th><th>started</th></tr></thead><tbody>' + runsRows + '</tbody></table>' : '<div class="muted">none</div>')
    + '<div class="section-title">' + icon("bug") + 'Findings</div>'
    + (d.findings.length ? '<table><thead><tr><th>status</th><th>title</th><th>location</th><th>timeline</th></tr></thead><tbody>' + findRows + '</tbody></table>' : '<div class="muted">none yet</div>')
    + (d.confirmDecisions.length ? '<div class="section-title">Confirm decisions</div><table><thead><tr><th>bug</th><th>reproduced</th><th>recommendation</th></tr></thead><tbody>'
        + d.confirmDecisions.map((c) => '<tr><td>' + esc(c.bug) + '</td><td class="mono">' + esc(c.reproduced) + '</td><td class="mono">' + esc(c.recommendation) + '</td></tr>').join("") + '</tbody></table>' : "");
  $("#continueBtn").onclick = () => command("continue", d);
  $("#restartBtn").onclick = () => command("restart", d);
  el.querySelectorAll("[data-kill]").forEach((b) => b.onclick = () => fetch("/api/kill", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ pid: Number(b.dataset.kill) }) }));
}

function specFromProject(d) {
  const cfg = (() => { try { return JSON.parse(d.project.config_json); } catch { return {}; } })();
  const arr = (v) => { try { return JSON.parse(v) || []; } catch { return []; } };
  return {
    target: d.project.name, sourcePaths: arr(d.project.source_paths),
    buildRoot: d.project.build_root || undefined, corpusPaths: arr(d.project.corpus_paths),
    provider: cfg.provider, model: cfg.model, thinking: cfg.thinking,
    maxScopes: cfg.maxScopes ?? undefined, mapSteps: cfg.mapSteps ?? undefined, digSteps: cfg.digSteps ?? undefined,
    digSamples: cfg.digSamples ?? undefined, digConcurrency: cfg.digConcurrency ?? undefined,
  };
}

async function command(which, d) {
  await fetch("/api/" + which, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(specFromProject(d)) });
}

const dialog = $("#runDialog");
$("#newRunBtn").onclick = () => dialog.showModal();
$("#cancelBtn").onclick = () => dialog.close();
$("#runForm").querySelector("[name=verb]").onchange = (e) => { $("#confirmOnly").style.display = e.target.value === "confirm" ? "grid" : "none"; };
$("#runForm").onsubmit = async (e) => {
  if (e.submitter && e.submitter.id !== "launchBtn") return;
  const f = new FormData($("#runForm"));
  const num = (k) => { const v = f.get(k); return v ? Number(v) : undefined; };
  const list = (k) => { const v = (f.get(k) || "").trim(); return v ? v.split(/\s+/) : []; };
  const spec = {
    verb: f.get("verb"), target: f.get("target"), sourcePaths: list("sourcePaths"),
    buildRoot: f.get("buildRoot") || undefined, corpusPaths: list("corpusPaths"),
    provider: f.get("provider") || undefined, model: f.get("model") || undefined, thinking: f.get("thinking") || undefined,
    maxScopes: num("maxScopes"), mapSteps: num("mapSteps"), digSteps: num("digSteps"),
    digSamples: num("digSamples"), digConcurrency: num("digConcurrency"),
    inputRunDir: f.get("inputRunDir") || undefined,
    quick: f.get("quick") === "on", mockLlm: f.get("mockLlm") === "on",
  };
  await fetch("/api/launch", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(spec) });
  setTimeout(() => selectProject(spec.target), 400);
};

function connect() {
  const es = new EventSource("/api/stream");
  es.onmessage = (ev) => {
    const data = JSON.parse(ev.data);
    state.projects = data.projects; state.active = data.active;
    $("#livePill").textContent = data.active.length ? "● " + data.active.length + " running" : "idle";
    $("#livePill").className = "counter" + (data.active.length ? " live" : "");
    renderList();
    if (state.selected) {
      const p = state.projects.find((x) => x.name === state.selected);
      if (p && p.activeRuns > 0) refreshDetail();
    }
  };
  es.onerror = () => { $("#livePill").textContent = "reconnecting…"; $("#livePill").className = "counter"; };
}
connect();
</script>
</body>
</html>
